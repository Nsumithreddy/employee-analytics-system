{% extends 'employees/base.html' %}

{% block content %}

<div class="card p-4">

<h3>Edit Employee</h3>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" name="name" value="{{ employee.name }}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" name="email" value="{{ employee.email }}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Department</label>
<input type="text" name="department" value="{{ employee.department }}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Role</label>
<input type="text" name="role" value="{{ employee.role }}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Date Joined</label>
<input type="date" name="date_joined" value="{{ employee.date_joined|date:'Y-m-d' }}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Profile Image</label>
<input type="file" name="profile_image" class="form-control">
</div>

</div>

<button class="btn btn-success">Update Employee</button>

</form>

</div>

{% endblock %}
