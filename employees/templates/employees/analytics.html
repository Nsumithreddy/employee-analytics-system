<!DOCTYPE html>
<html>
<head>
<title>Employee Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Employee Analytics Dashboard</h2>

{% if labels %}
<div class="text-center">
<div class="card shadow p-4 mb-4">

<h4 class="mb-3">Employees per Department</h4>

<canvas id="deptChart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = JSON.parse('{{ labels|safe }}'.replace(/'/g, '"'));
const data = JSON.parse('{{ data|safe }}'.replace(/'/g, '"'));

const total = data.reduce((a, b) => a + b, 0);

new Chart(document.getElementById('deptChart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Employees',
            data: data,
            backgroundColor: [
            '#0d6efd',
            '#20c997',
            '#ffc107',
            '#dc3545',
            '#6f42c1'
            ]
        }]
    },
    options: {
        responsive: true,
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context) {
                        let value = context.raw;
                        let percent = ((value / total) * 100).toFixed(1);
                        return value + " employees (" + percent + "%)";
                    }
                }
            }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>
</div>
{% else %}
<p>No employee data available</p>
{% endif %}
<br><br>

<a href="/" class="btn btn-primary">Back to Dashboard</a>

</div>

</body>
</html>
